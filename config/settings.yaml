system_name: Cortex
version: 1.0.0
debug_mode: false

# Model performance — tune these for your hardware.
# If you have an NVIDIA GPU with CUDA: set use_gpu: true, gpu_layers: 20-35
# CPU-only machine: keep use_gpu: false, gpu_layers: 0
# Reduce threads if Cortex is using too much CPU (e.g. threads: 2)
model:
  max_tokens: 512
  use_gpu: false   # set true only if you have an NVIDIA GPU with CUDA installed
  gpu_layers: 0    # set to 20-35 only with a CUDA GPU
  threads: 2       # CPU threads per inference — raise to 4 for speed, lower for less CPU
  batch_size: 128  # tokens per CPU burst — lower = smoother load
logging:
  log_level: info
  log_dir: ./logs
  log_file: cortex.log
  max_file_size: 10485760
  backup_count: 5
  log_to_console: true
  log_to_file: true
memory:
  vector_db_path: ./memory/vector_db
  embedding_model: all-MiniLM-L6-v2
  collection_name: ai_memory
  short_term_days: 7
  long_term_threshold: 0.7
  max_memories: 10000
  cleanup_interval: 86400
  max_search_results: 10
  similarity_threshold: 0.6
task_queue:
  max_concurrent_tasks: 5
  task_timeout: 600
  retry_delay: 5
  max_queue_size: 1000
  priority_enabled: true
